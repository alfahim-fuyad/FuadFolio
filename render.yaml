services:
  - type: web
    name: fuadfolio
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && (python manage.py createsuperuser --noinput || true)"
    startCommand: "gunicorn FuadFolio.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string in the Render dashboard
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false   # set in the Render dashboard — used to auto-create the /admin/ login on deploy
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false   # set in the Render dashboard
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false   # set in the Render dashboard
      - key: SITE_GITHUB_USERNAME
        value: alfahim-fuyad
      - key: SITE_EMAIL
        value: md.alfahim.fuyad@gmail.com
      - key: SITE_LINKEDIN_URL
        value: https://www.linkedin.com/in/al-fahim-36126636b
      - key: SITE_FACEBOOK_URL
        value: https://www.facebook.com/alfahim07
